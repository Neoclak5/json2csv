name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      # ── Formato y linting ─────────────────────────────────────────────

      - name: Ruff — lint
        run: ruff check src/ tests/

      - name: Black — formato consistente
        run: black --check src/ tests/

      - name: Pycodestyle — PEP 8
        run: pycodestyle --max-line-length=88 src/

      - name: Pydocstyle — PEP 257 (convenciones de docstrings)
        run: pydocstyle src/

      # ── Tipado estático ───────────────────────────────────────────────

      - name: MyPy — verificación de tipos
        run: mypy src/

      - name: PyRight — verificación de tipos
        run: pyright src/

      # ── Pruebas con cobertura ─────────────────────────────────────────

      - name: Pytest — suite de pruebas (cobertura >= 85%)
        run: pytest

      # ── Seguridad ─────────────────────────────────────────────────────

      - name: Bandit — análisis de seguridad
        run: bandit -r src/ -ll

      # ── Documentación ─────────────────────────────────────────────────

      - name: Generar documentación con pdoc
        run: pdoc --output-dir docs/ src/json2csv

      - name: Subir documentación como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: docs/
